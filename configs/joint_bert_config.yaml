# JointBERT + PhoBERT Configuration
model:
  name: "vinai/phobert-base-v2"
  hidden_size: 768
  dropout: 0.1

training:
  learning_rate: 5e-5
  batch_size: 32  # Use 8 if CPU/low memory
  epochs: 15
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 128
  early_stopping_patience: 3

loss:
  intent_weight: 1.0
  slot_weight: 1.0
  ignore_index: -100  # For subword padding

paths:
  train_data: "data/processed/train"
  val_data: "data/processed/dev"
  test_data: "data/processed/test"
  checkpoint_dir: "models/checkpoints/jointbert"
  best_model: "models/best_jointbert.pt"

evaluation:
  metrics: ["intent_accuracy", "intent_f1_macro", "slot_f1", "sentence_accuracy"]
