# TF-IDF + SVM Baseline Configuration
vectorizer:
  type: "tfidf"
  max_features: 10000
  ngram_range: [1, 2]  # unigrams and bigrams
  sublinear_tf: true
  min_df: 2

classifier:
  type: "svm"
  kernel: "linear"  # linear works best for text
  C: 1.0
  class_weight: "balanced"
  probability: true  # Enable probability estimates

preprocessing:
  use_word_segmentation: true
  tokenizer: "underthesea"  # or "vncorenlp"
  lowercase: true
  remove_punctuation: false

paths:
  train_data: "data/processed/train"
  val_data: "data/processed/dev"
  test_data: "data/processed/test"
  model_path: "models/svm_baseline.joblib"
  vectorizer_path: "models/tfidf_vectorizer.joblib"

evaluation:
  metrics: ["intent_accuracy", "intent_f1_macro"]
